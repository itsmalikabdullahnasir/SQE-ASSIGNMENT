# ════════════════════════════════════════════════════════════════
#  ci.yml  —  GitHub Actions Workflow
#  File location: .github/workflows/ci.yml
# ════════════════════════════════════════════════════════════════
#
#  WHAT THIS FILE DOES
#  ───────────────────
#  Every time you run "git push", GitHub automatically:
#    1. Spins up a fresh Linux machine (free)
#    2. Checks out your code
#    3. Installs Java 11
#    4. Runs ALL 37 MC/DC test cases with Maven
#    5. Generates a JaCoCo HTML coverage report
#    6. Uploads the report so you can download it
#    7. Fails the build if branch coverage drops below 85 %
#
#  WHERE TO SEE RESULTS
#  ────────────────────
#  GitHub repo  →  Actions tab  →  click the latest run
#
#  HOW TO GET THE COVERAGE REPORT
#  ────────────────────────────────
#  Actions tab  →  latest run  →  scroll to Artifacts
#  →  click "jacoco-coverage-report"  →  download ZIP
#  →  extract  →  open index.html in a browser
# ════════════════════════════════════════════════════════════════

name: CI – Search Library MC/DC Tests

# ── When to run ──────────────────────────────────────────────────
on:
  push:
    branches: [ "main", "develop" ]      # every git push
  pull_request:
    branches: [ "main", "develop" ]      # every pull request
  workflow_dispatch:                     # manual run from Actions tab

# ── Jobs ─────────────────────────────────────────────────────────
jobs:

  build-and-test:
    name: Build · Run 37 MC/DC Tests · Coverage Report
    runs-on: ubuntu-latest               # free GitHub-hosted Linux VM

    steps:

      # ── Step 1 ── Get the code ───────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Step 2 ── Install Java 11 ────────────────────────────
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'        # free OpenJDK from Adoptium
          cache: 'maven'                 # cache Maven downloads → faster future runs

      # ── Step 3 ── Compile + run all 37 test cases ────────────
      - name: Run all MC/DC tests
        run: mvn --batch-mode clean test
        #  clean  = delete old build artefacts
        #  test   = compile everything, then run every @Test method
        #           JaCoCo agent records which branches are hit

      # ── Step 4 ── Build HTML coverage report ─────────────────
      - name: Generate JaCoCo coverage report
        run: mvn jacoco:report
        # Output: target/site/jacoco/index.html

      # ── Step 5 ── Upload report as downloadable artefact ─────
      - name: Upload JaCoCo coverage report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-coverage-report   # name shown in Actions tab
          path: target/site/jacoco/      # folder with index.html
          retention-days: 14             # available for 14 days

      # ── Step 6 ── Upload raw Surefire XML results ─────────────
      - name: Upload Surefire test results
        uses: actions/upload-artifact@v4
        if: always()                     # upload EVEN IF tests fail
        with:
          name: surefire-test-results
          path: target/surefire-reports/
          retention-days: 14

      # ── Step 7 ── Enforce 85 % branch-coverage threshold ─────
      - name: Enforce coverage threshold (≥ 85 % branch coverage)
        run: mvn jacoco:check
        # Configured in pom.xml — build FAILS if threshold not met
